<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PSO Website Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">PSO</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Fuel</a>
    <a href="#">Stations</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Welcome to PSO</h1>
  <p>Pakistan State Oil - Energy for Progress</p>
  <button>Find Stations</button>
</section>

<section class="fuel-section">
  <h2>Fuel Prices (Live API Style)</h2>
<input type="text" id="searchBox" placeholder="Search fuel type (Petrol, Diesel...)" class="search-box">
  <table class="fuel-table">
    <thead>
      <tr>
        <th>Fuel Type</th>
        <th>Price (PKR)</th>
        <th>Status</th>
        <th>Last Updated</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>Petrol</td>
        <td>278.00</td>
        <td class="up">▲ Increased</td>
        <td>Today</td>
      </tr>

      <tr>
        <td>Diesel</td>
        <td>285.50</td>
        <td class="down">▼ Decreased</td>
        <td>Today</td>
      </tr>

      <tr>
        <td>High Octane</td>
        <td>315.00</td>
        <td class="stable">● Stable</td>
        <td>Today</td>
      </tr>
    </tbody>
  </table>
</section>
<footer>
  <p>© 2026 PSO Clone Website</p>
</footer>

</body>
</html>
